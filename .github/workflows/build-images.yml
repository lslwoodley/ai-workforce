name: Build & Push Docker Images

# Triggers:
#   - Push to main (publishes :latest and :sha tags)
#   - Pull requests against main (builds only, no push — validates the Dockerfiles)
#   - Manual dispatch (re-publish without a code change)

on:
  push:
    branches: [main]
    paths:
      # Only rebuild when something that affects images changes
      - "skills/hermes-paperclip-setup/docker/**"
      - ".github/workflows/build-images.yml"
  pull_request:
    branches: [main]
    paths:
      - "skills/hermes-paperclip-setup/docker/**"
  workflow_dispatch:
    inputs:
      no_cache:
        description: "Force rebuild without Docker layer cache"
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  # Images are published under your GitHub username (lowercase required by ghcr.io)
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    strategy:
      fail-fast: false   # build all images even if one fails
      matrix:
        include:
          - service: paperclip
            context: skills/hermes-paperclip-setup/docker/paperclip
            image_name: ai-workforce-paperclip

          - service: hermes-worker
            context: skills/hermes-paperclip-setup/docker/hermes
            image_name: ai-workforce-hermes-worker

          - service: mcp-server
            context: skills/hermes-paperclip-setup/docker/mcp
            image_name: ai-workforce-mcp-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Enable multi-platform builds if needed in future (linux/amd64, linux/arm64)
          install: true

      - name: Log in to GitHub Container Registry
        # Only push on main branch or manual dispatch — not on PRs
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image_name }}
          tags: |
            # :latest on pushes to main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # :<short-sha> for pinning (e.g. ghcr.io/user/image:abc1234)
            type=sha,prefix=,format=short
            # :main branch name tag
            type=ref,event=branch

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          # Push only on main / manual dispatch; just build on PRs
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: ${{ github.event.inputs.no_cache == 'true' }}
          # GitHub Actions cache speeds up subsequent builds significantly
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "### Image published" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY

  # Post a summary comment on PRs showing which images would be affected
  pr-summary:
    name: PR build summary
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### ✅ Docker image builds passed\n\nAll three images (paperclip, hermes-worker, mcp-server) built successfully.\nImages will be published to ghcr.io when this PR is merged to \`main\`.`
            })
