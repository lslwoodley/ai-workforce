# Hermes + Paperclip AI Workforce — Unified Docker Compose
#
# Usage:
#   cp .env.example .env        # fill in API keys
#   docker compose up --build -d
#   open http://localhost:3100   # Paperclip UI
#
# Credential pools: add _2 / _3 variants of any key in .env for automatic
# same-provider rotation on 429/402 errors (see .env.example for details).
#
# Idempotency: safe to run docker compose up -d repeatedly.
# Data persists in named volumes. Use `docker compose down -v` only for a full reset.

# ── Shared network ─────────────────────────────────────────────────────────────
networks:
  ai-workforce:
    driver: bridge
    name: ai-workforce

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  paperclip-data:   # Paperclip DB, org chart, tasks, Claude Code credentials
  hermes-sessions:  # Per-agent session state and memory
  hermes-skills:    # Shared skills directory (all workers read/write)

# ── Extension fields (YAML anchors for shared config) ─────────────────────────
x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

# ── Shared credential environment (applied to all agent services) ──────────────
x-credentials: &credentials
  # OpenRouter — primary pool (round_robin across _2 / _3 keys)
  OPENROUTER_API_KEY:   "${OPENROUTER_API_KEY:-}"
  OPENROUTER_API_KEY_2: "${OPENROUTER_API_KEY_2:-}"
  OPENROUTER_API_KEY_3: "${OPENROUTER_API_KEY_3:-}"
  # Anthropic — least_used; pairs with Claude Code OAuth
  ANTHROPIC_API_KEY:    "${ANTHROPIC_API_KEY:-}"
  ANTHROPIC_API_KEY_2:  "${ANTHROPIC_API_KEY_2:-}"
  # OpenAI — fill_first fallback
  OPENAI_API_KEY:       "${OPENAI_API_KEY:-}"
  OPENAI_API_KEY_2:     "${OPENAI_API_KEY_2:-}"
  # Google Gemini — custom OpenAI-compatible endpoint
  GOOGLE_API_KEY:       "${GOOGLE_API_KEY:-}"
  GOOGLE_API_KEY_2:     "${GOOGLE_API_KEY_2:-}"
  GOOGLE_MODEL:         "${GOOGLE_MODEL:-gemini-2.0-flash-lite}"
  # DeepSeek — cheap cloud reasoning (deepseek-reasoner / deepseek-chat)
  DEEPSEEK_API_KEY:     "${DEEPSEEK_API_KEY:-}"
  DEEPSEEK_MODEL:       "${DEEPSEEK_MODEL:-deepseek-reasoner}"
  # LM Studio — local Windows GPU, zero cost, OpenAI-compatible (recommended fallback)
  LM_STUDIO_BASE_URL:   "${LM_STUDIO_BASE_URL:-http://host.docker.internal:1235}"
  LM_STUDIO_MODEL:      "${LM_STUDIO_MODEL:-}"
  # Ollama — local LLMs, zero cost (alternative to LM Studio)
  OLLAMA_BASE_URL:      "${OLLAMA_BASE_URL:-}"
  OLLAMA_MODEL:         "${OLLAMA_MODEL:-llama3.2}"
  # Default model — overrides provider defaults
  HERMES_MODEL:         "${HERMES_MODEL:-openrouter/nvidia/nemotron-3-super-120b-a12b:free}"

# ══════════════════════════════════════════════════════════════════════════════
services:

  # ── Paperclip: Company OS ────────────────────────────────────────────────────
  # Clones the official repo at build time; pin PAPERCLIP_VERSION to lock a release.
  # Claude Code (claude CLI) is installed by Paperclip as a dependency and runs
  # as the agent subprocess. Authenticate with: docker compose exec paperclip claude auth login
  paperclip:
    <<: [*restart, *logging]
    build:
      context: ./paperclip
      dockerfile: Dockerfile
      args:
        PAPERCLIP_VERSION: "${PAPERCLIP_VERSION:-master}"
    image: ai-workforce/paperclip:${PAPERCLIP_VERSION:-master}
    container_name: paperclip
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    environment:
      <<: *credentials
      HOST: "0.0.0.0"
      PAPERCLIP_HOME: /paperclip
      PAPERCLIP_ADMIN_PASSWORD: "${PAPERCLIP_ADMIN_PASSWORD:-changeme}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-ai-workforce-paperclip-secret-change-in-prod-32x}"
      HERMES_ACCEPT_HOOKS: "1"
      HERMES_YOLO_MODE: "1"
      # Grace period before hermes raises KeyboardInterrupt on SIGTERM (seconds).
      # Set generously so an in-flight agent task can finish before being interrupted.
      HERMES_SIGTERM_GRACE: "${HERMES_SIGTERM_GRACE:-3600}"
      # Git credentials — lets Paperclip clone private repos as agent workspace
      AGENT_GIT_TOKEN:  "${AGENT_GIT_TOKEN:-}"
      AGENT_GIT_USER:   "${AGENT_GIT_USER:-ai-workforce-bot}"
      AGENT_REPO_URL:   "${AGENT_REPO_URL:-}"
    volumes:
      - paperclip-data:/paperclip
    networks:
      - ai-workforce
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- --tries=1 --timeout=5 http://localhost:3100/ >/dev/null 2>&1; exit 0"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Hermes Gateway: Full Hermes agent runtime + API server ───────────────────
  # Runs hermes-agent with gateway mode enabled.
  # Exposes an OpenAI-compatible API on port 8642:
  #   POST http://localhost:8642/v1/chat/completions
  #   GET  http://localhost:8642/v1/models
  #   GET  http://localhost:8642/health
  #
  # Credential pools: OpenRouter (round_robin) → Anthropic (least_used)
  #   → OpenAI (fill_first) → Gemini → Ollama
  #   Fallback: free Nemotron on OpenRouter
  #
  # Add messaging tokens in .env to also bridge Telegram, Discord, Slack:
  #   TELEGRAM_BOT_TOKEN, DISCORD_BOT_TOKEN, SLACK_BOT_TOKEN
  hermes-gateway:
    <<: [*restart, *logging]
    build:
      context: ./hermes
      dockerfile: Dockerfile
    image: ai-workforce/hermes-gateway:latest
    container_name: hermes-gateway
    depends_on:
      paperclip:
        condition: service_healthy
    ports:
      - "${HERMES_GATEWAY_PORT:-8642}:8642"
    environment:
      <<: *credentials
      API_SERVER_PORT: "8642"
      API_SERVER_ENABLED: "true"
      HERMES_SESSIONS_DIR: /hermes/sessions
      HERMES_SKILLS_DIR:   /hermes/skills
      GATEWAY_ALLOW_ALL_USERS: "true"
      # Messaging platform tokens (optional — enables Telegram/Discord/Slack bridges)
      TELEGRAM_BOT_TOKEN:  "${TELEGRAM_BOT_TOKEN:-}"
      DISCORD_BOT_TOKEN:   "${DISCORD_BOT_TOKEN:-}"
      SLACK_BOT_TOKEN:     "${SLACK_BOT_TOKEN:-}"
      # Git workspace
      AGENT_GIT_TOKEN:       "${AGENT_GIT_TOKEN:-}"
      AGENT_REPO_URL:        "${AGENT_REPO_URL:-}"
      AGENT_GIT_USER:        "${AGENT_GIT_USER:-ai-workforce-bot}"
      AGENT_GIT_EMAIL:       "${AGENT_GIT_EMAIL:-agents@localhost}"
      AGENT_WORKSPACE_MOUNT: "${AGENT_WORKSPACE_MOUNT:-/workspace}"
    volumes:
      - hermes-sessions:/hermes/sessions
      - hermes-skills:/hermes/skills
      # Share Claude Code OAuth credentials from Paperclip container
      - paperclip-data:/paperclip:ro
    networks:
      - ai-workforce

  # ── MCP Server: Agent-to-Agent Tool API ──────────────────────────────────────
  # Exposes workforce operations as MCP tools over HTTP (port 8765).
  # Any MCP-compatible agent can call list_agents, assign_task, query_agent, etc.
  mcp-server:
    <<: [*restart, *logging]
    build:
      context: ./mcp
      dockerfile: Dockerfile
    image: ai-workforce/mcp-server:latest
    container_name: mcp-server
    depends_on:
      paperclip:
        condition: service_healthy
    ports:
      - "${MCP_SERVER_PORT:-8765}:8765"
    environment:
      PAPERCLIP_API_URL: "http://paperclip:3100"
      PAPERCLIP_API_KEY: "${PAPERCLIP_API_KEY:-}"
      HERMES_SESSIONS_DIR: /hermes/sessions
      MCP_SERVER_PORT: "8765"
      MCP_SERVER_HOST: "0.0.0.0"
    volumes:
      - hermes-sessions:/hermes/sessions:ro
    networks:
      - ai-workforce
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8765/health', timeout=3)"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 20s
